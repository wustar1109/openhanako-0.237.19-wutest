<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>转矢量图</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/lucide.js?v=2026.06.06.1"></script>
    <script src="/static/js/theme.js?v=2026.06.06.1"></script>
    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.06.06.1');

        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --panel-soft: #f1f5f9;
            --text: #0f172a;
            --muted: #94a3b8;
            --border: #e5e7eb;
            --border-strong: #cbd5e1;
            --accent: #0f172a;
            --accent-text: #ffffff;
            --danger: #ef4444;
            --ok: #10b981;
            --shadow: 0 18px 42px rgba(15, 23, 42, 0.06);
            --ease: cubic-bezier(.2, .8, .2, 1);
        }

        html.theme-dark,
        body.theme-dark,
        html.studio-theme-dark,
        body.studio-theme-dark {
            --bg: #0f141d;
            --panel: #151c28;
            --panel-soft: #111827;
            --text: #e5e7eb;
            --muted: #8b98aa;
            --border: #263244;
            --border-strong: #3b4658;
            --accent: #f8fafc;
            --accent-text: #0f172a;
            --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        }

        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        button, input, select {
            font: inherit;
        }

        .page {
            width: min(1440px, calc(100vw - 64px));
            margin: 0 auto;
            padding: 48px 0 56px;
        }

        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 40px;
        }

        .brand-title {
            margin: 0;
            color: var(--text);
            font-size: clamp(34px, 4vw, 52px);
            line-height: .95;
            font-weight: 900;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .32em;
            text-transform: uppercase;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel);
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--muted);
        }

        .status.ok .status-dot { background: var(--ok); }
        .status.error .status-dot { background: var(--danger); }

        .workspace {
            display: grid;
            grid-template-columns: minmax(360px, 480px) minmax(0, 1fr);
            gap: 32px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .control-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 9px;
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .drop-zone {
            position: relative;
            display: grid;
            min-height: 240px;
            place-items: center;
            overflow: hidden;
            border: 1px dashed var(--border-strong);
            border-radius: 22px;
            background:
                linear-gradient(45deg, transparent 48%, rgba(148, 163, 184, .16) 49%, rgba(148, 163, 184, .16) 51%, transparent 52%),
                var(--panel-soft);
            background-size: 18px 18px;
            cursor: pointer;
            transition: border-color .2s var(--ease), transform .2s var(--ease), background .2s var(--ease);
        }

        .drop-zone:hover,
        .drop-zone.dragging {
            border-color: var(--text);
            transform: translateY(-1px);
        }

        .drop-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text);
            text-align: center;
            pointer-events: none;
        }

        .drop-empty .icon-wrap {
            display: grid;
            width: 54px;
            height: 54px;
            place-items: center;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--panel);
        }

        .drop-empty strong {
            font-size: 14px;
            font-weight: 900;
        }

        .drop-empty span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .source-preview {
            display: none;
            width: 100%;
            height: 100%;
            min-height: 240px;
            object-fit: contain;
            background: var(--panel-soft);
        }

        .source-meta {
            display: none;
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 12px;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(15, 23, 42, .78);
            color: #fff;
            backdrop-filter: blur(12px);
        }

        .source-meta span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 800;
        }

        .clear-btn {
            width: 30px;
            height: 30px;
            border: 0;
            border-radius: 10px;
            background: rgba(255,255,255,.16);
            color: #fff;
            cursor: pointer;
        }

        .drop-zone.has-file .drop-empty { display: none; }
        .drop-zone.has-file .source-preview { display: block; }
        .drop-zone.has-file .source-meta { display: flex; }

        .grid-two {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .field label,
        .range-head label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .06em;
        }

        .select,
        .number {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            outline: none;
            background: var(--panel-soft);
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
        }

        .select:focus,
        .number:focus {
            border-color: var(--text);
        }

        .range-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .range-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .range-value {
            min-width: 48px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            border-radius: 10px;
            background: var(--panel-soft);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--text);
        }

        .primary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: 54px;
            border: 0;
            border-radius: 16px;
            background: var(--accent);
            color: var(--accent-text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .18em;
            text-transform: uppercase;
            transition: transform .2s var(--ease), opacity .2s var(--ease);
        }

        .primary-btn:hover { transform: translateY(-1px); }
        .primary-btn:disabled {
            cursor: not-allowed;
            opacity: .55;
            transform: none;
        }

        .result-panel {
            min-height: 720px;
            padding: 24px;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 18px;
        }

        .result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
        }

        .result-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .result-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            display: inline-grid;
            width: 42px;
            height: 42px;
            place-items: center;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--panel);
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
        }

        .icon-btn[aria-disabled="true"] {
            pointer-events: none;
            opacity: .35;
        }

        .preview-box {
            display: grid;
            place-items: center;
            min-height: 520px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 22px;
            background:
                linear-gradient(45deg, rgba(148,163,184,.18) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(148,163,184,.18) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(148,163,184,.18) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(148,163,184,.18) 75%);
            background-color: var(--panel-soft);
            background-size: 28px 28px;
            background-position: 0 0, 0 14px, 14px -14px, -14px 0;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .result-svg {
            display: none;
            width: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .result-panel.has-result .placeholder { display: none; }
        .result-panel.has-result .result-svg { display: block; }

        .message {
            min-height: 22px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .message.error { color: var(--danger); }
        .message.ok { color: var(--ok); }

        @media (max-width: 980px) {
            .page { width: min(100vw - 28px, 760px); padding-top: 28px; }
            .header { align-items: flex-start; flex-direction: column; }
            .workspace { grid-template-columns: 1fr; }
            .result-panel { min-height: 560px; }
            .preview-box { min-height: 380px; }
        }

        @media (max-width: 560px) {
            .grid-two { grid-template-columns: 1fr; }
            .control-panel,
            .result-panel { padding: 16px; border-radius: 22px; }
        }
    </style>
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.06.06.1">
</head>
<body>
    <main class="page">
        <header class="header">
            <div>
                <h1 class="brand-title">VECTORIZE<sup style="font-size:.28em;">®</sup></h1>
                <p class="brand-subtitle">位图转 SVG</p>
            </div>
            <div id="serviceStatus" class="status">
                <span class="status-dot"></span>
                <span>等待图片</span>
            </div>
        </header>

        <section class="workspace">
            <div class="panel control-panel">
                <section>
                    <h2 class="section-title"><i data-lucide="image-up" aria-hidden="true"></i>01. 输入图片</h2>
                    <div id="dropZone" class="drop-zone" role="button" tabindex="0">
                        <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif,image/tiff" hidden>
                        <div class="drop-empty">
                            <div class="icon-wrap"><i data-lucide="upload" aria-hidden="true"></i></div>
                            <strong>拖放位图到这里</strong>
                            <span>PNG / JPG / WebP / BMP</span>
                        </div>
                        <img id="sourcePreview" class="source-preview" alt="输入图片预览">
                        <div class="source-meta">
                            <span id="sourceName">image.png</span>
                            <button id="clearFileBtn" class="clear-btn" type="button" title="移除图片">
                                <i data-lucide="x" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="section-title"><i data-lucide="layers" aria-hidden="true"></i>02. 预处理</h2>
                    <div class="grid-two">
                        <div class="field">
                            <label for="preprocessMode">处理方式</label>
                            <select id="preprocessMode" class="select">
                                <option value="gray_layers">灰度分层后矢量化</option>
                                <option value="raw">原图直转</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="backgroundMode">白底处理</label>
                            <select id="backgroundMode" class="select">
                                <option value="keep">保留白底</option>
                                <option value="remove">去白底</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section style="display:flex; flex-direction:column; gap:14px;">
                    <div class="range-row">
                        <div class="range-head"><label for="grayLayers">灰阶层数</label><span class="range-value" data-value-for="grayLayers">12</span></div>
                        <input id="grayLayers" type="range" min="2" max="32" value="12" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="bgThreshold">白底阈值</label><span class="range-value" data-value-for="bgThreshold">248</span></div>
                        <input id="bgThreshold" type="range" min="200" max="255" value="248" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="blurKernel">模糊核</label><span class="range-value" data-value-for="blurKernel">3</span></div>
                        <input id="blurKernel" type="range" min="1" max="9" value="3" step="2">
                    </div>
                </section>

                <section>
                    <h2 class="section-title"><i data-lucide="sliders-horizontal" aria-hidden="true"></i>03. VTracer</h2>
                    <div class="grid-two">
                        <div class="field">
                            <label for="colormode">颜色模式</label>
                            <select id="colormode" class="select">
                                <option value="color">彩色</option>
                                <option value="binary">黑白</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="hierarchical">层级方式</label>
                            <select id="hierarchical" class="select">
                                <option value="stacked">堆叠</option>
                                <option value="cutout">镂空</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="mode">路径模式</label>
                            <select id="mode" class="select">
                                <option value="spline">平滑曲线</option>
                                <option value="polygon" selected>多边形</option>
                                <option value="none">无曲线拟合</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="maxIterations">迭代次数</label>
                            <input id="maxIterations" class="number" type="number" min="1" max="32" value="10">
                        </div>
                    </div>
                </section>

                <section style="display:flex; flex-direction:column; gap:14px;">
                    <div class="range-row">
                        <div class="range-head"><label for="filterSpeckle">过滤噪点</label><span class="range-value" data-value-for="filterSpeckle">3</span></div>
                        <input id="filterSpeckle" type="range" min="0" max="64" value="3" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="colorPrecision">颜色精度</label><span class="range-value" data-value-for="colorPrecision">8</span></div>
                        <input id="colorPrecision" type="range" min="1" max="8" value="8" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="layerDifference">渐变层差</label><span class="range-value" data-value-for="layerDifference">6</span></div>
                        <input id="layerDifference" type="range" min="0" max="128" value="6" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="cornerThreshold">角点阈值</label><span class="range-value" data-value-for="cornerThreshold">70</span></div>
                        <input id="cornerThreshold" type="range" min="0" max="180" value="70" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="lengthThreshold">细分长度</label><span class="range-value" data-value-for="lengthThreshold">4</span></div>
                        <input id="lengthThreshold" type="range" min="0" max="20" value="4" step="0.5">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="spliceThreshold">拼接阈值</label><span class="range-value" data-value-for="spliceThreshold">45</span></div>
                        <input id="spliceThreshold" type="range" min="0" max="180" value="45" step="1">
                    </div>
                    <div class="range-row">
                        <div class="range-head"><label for="pathPrecision">路径小数精度</label><span class="range-value" data-value-for="pathPrecision">5</span></div>
                        <input id="pathPrecision" type="range" min="0" max="8" value="5" step="1">
                    </div>
                </section>

                <button id="runBtn" class="primary-btn" type="button" disabled>
                    <i data-lucide="wand-sparkles" aria-hidden="true"></i>
                    生成 SVG
                </button>
                <div id="message" class="message"></div>
            </div>

            <div id="resultPanel" class="panel result-panel">
                <div class="result-head">
                    <h2 class="result-title"><i data-lucide="pen-tool" aria-hidden="true"></i>Result</h2>
                    <div class="result-actions">
                        <a id="openBtn" class="icon-btn" href="#" target="_blank" rel="noreferrer" aria-disabled="true" title="在新窗口打开">
                            <i data-lucide="external-link" aria-hidden="true"></i>
                        </a>
                        <a id="downloadBtn" class="icon-btn" href="#" download aria-disabled="true" title="下载 SVG">
                            <i data-lucide="download" aria-hidden="true"></i>
                        </a>
                    </div>
                </div>
                <div class="preview-box">
                    <div class="placeholder">
                        <i data-lucide="file-type" aria-hidden="true"></i>
                        <span>SVG 结果会显示在这里</span>
                    </div>
                    <img id="resultSvg" class="result-svg" alt="SVG 结果预览">
                </div>
                <div id="resultMeta" class="message"></div>
            </div>
        </section>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const sourcePreview = document.getElementById('sourcePreview');
        const sourceName = document.getElementById('sourceName');
        const clearFileBtn = document.getElementById('clearFileBtn');
        const runBtn = document.getElementById('runBtn');
        const message = document.getElementById('message');
        const resultPanel = document.getElementById('resultPanel');
        const resultSvg = document.getElementById('resultSvg');
        const resultMeta = document.getElementById('resultMeta');
        const openBtn = document.getElementById('openBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const serviceStatus = document.getElementById('serviceStatus');

        let selectedFile = null;
        let previewUrl = '';

        function refreshIcons() {
            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }
        }

        function setStatus(kind, text) {
            serviceStatus.classList.remove('ok', 'error');
            if (kind) serviceStatus.classList.add(kind);
            serviceStatus.querySelector('span:last-child').textContent = text;
        }

        function setMessage(text, kind) {
            message.textContent = text || '';
            message.className = 'message' + (kind ? ' ' + kind : '');
        }

        function updateRangeValues() {
            document.querySelectorAll('input[type="range"]').forEach(input => {
                const target = document.querySelector(`[data-value-for="${input.id}"]`);
                if (target) target.textContent = input.value;
            });
        }

        function setFile(file) {
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                setMessage('请选择图片文件。', 'error');
                return;
            }
            selectedFile = file;
            if (previewUrl) URL.revokeObjectURL(previewUrl);
            previewUrl = URL.createObjectURL(file);
            sourcePreview.src = previewUrl;
            sourceName.textContent = file.name || 'image';
            dropZone.classList.add('has-file');
            runBtn.disabled = false;
            setStatus('ok', '图片已载入');
            setMessage('');
        }

        function clearFile() {
            selectedFile = null;
            if (previewUrl) URL.revokeObjectURL(previewUrl);
            previewUrl = '';
            sourcePreview.removeAttribute('src');
            dropZone.classList.remove('has-file');
            runBtn.disabled = true;
            setStatus('', '等待图片');
            setMessage('');
        }

        function formValue(id) {
            return document.getElementById(id).value;
        }

        function buildFormData() {
            const form = new FormData();
            form.append('file', selectedFile);
            form.append('preprocess_enabled', formValue('preprocessMode') === 'gray_layers' ? 'true' : 'false');
            form.append('background_mode', formValue('backgroundMode'));
            form.append('gray_layers', formValue('grayLayers'));
            form.append('bg_threshold', formValue('bgThreshold'));
            form.append('blur_kernel', formValue('blurKernel'));
            form.append('colormode', formValue('colormode'));
            form.append('hierarchical', formValue('hierarchical'));
            form.append('mode', formValue('mode'));
            form.append('max_iterations', formValue('maxIterations'));
            form.append('filter_speckle', formValue('filterSpeckle'));
            form.append('color_precision', formValue('colorPrecision'));
            form.append('layer_difference', formValue('layerDifference'));
            form.append('gradient_step', formValue('layerDifference'));
            form.append('corner_threshold', formValue('cornerThreshold'));
            form.append('length_threshold', formValue('lengthThreshold'));
            form.append('segment_length', formValue('lengthThreshold'));
            form.append('splice_threshold', formValue('spliceThreshold'));
            form.append('path_precision', formValue('pathPrecision'));
            return form;
        }

        async function runVectorize() {
            if (!selectedFile) {
                setMessage('请先上传一张位图。', 'error');
                return;
            }
            runBtn.disabled = true;
            setStatus('', '矢量化中');
            setMessage('正在生成 SVG...');
            try {
                const response = await fetch('/api/vectorize', {
                    method: 'POST',
                    body: buildFormData()
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.detail || '矢量化失败');
                }
                const cacheBustUrl = data.url + (data.url.includes('?') ? '&' : '?') + 't=' + Date.now();
                resultSvg.src = cacheBustUrl;
                resultPanel.classList.add('has-result');
                openBtn.href = data.url;
                openBtn.setAttribute('aria-disabled', 'false');
                downloadBtn.href = `/api/download-output?url=${encodeURIComponent(data.url)}&name=${encodeURIComponent(data.name || 'vector.svg')}`;
                downloadBtn.download = data.name || 'vector.svg';
                downloadBtn.setAttribute('aria-disabled', 'false');
                resultMeta.textContent = data.name || '';
                resultMeta.className = 'message ok';
                setStatus('ok', '生成完成');
                setMessage('SVG 已生成。', 'ok');
            } catch (err) {
                const text = err && err.message ? err.message : '矢量化失败';
                setStatus('error', '生成失败');
                setMessage(text, 'error');
            } finally {
                runBtn.disabled = !selectedFile;
            }
        }

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('keydown', event => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                fileInput.click();
            }
        });
        fileInput.addEventListener('change', event => {
            setFile(event.target.files && event.target.files[0]);
            fileInput.value = '';
        });
        clearFileBtn.addEventListener('click', event => {
            event.stopPropagation();
            clearFile();
        });
        ['dragenter', 'dragover'].forEach(name => {
            dropZone.addEventListener(name, event => {
                event.preventDefault();
                dropZone.classList.add('dragging');
            });
        });
        ['dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, event => {
                event.preventDefault();
                dropZone.classList.remove('dragging');
            });
        });
        dropZone.addEventListener('drop', event => {
            setFile(event.dataTransfer.files && event.dataTransfer.files[0]);
        });
        runBtn.addEventListener('click', runVectorize);
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', updateRangeValues);
        });

        window.addEventListener('beforeunload', () => {
            if (previewUrl) URL.revokeObjectURL(previewUrl);
        });

        updateRangeValues();
        refreshIcons();
    </script>
</body>
</html>
