<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>AI Studio</title>
    <style>
        html.studio-route-booting body {
            visibility: hidden !important;
        }
    </style>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                document.documentElement.classList.add('studio-route-booting');
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.06.06.1"></script>
    <script src="/static/js/theme.js?v=2026.06.06.1"></script>
    <script src="/static/js/i18n.js?v=2026.06.06.1"></script>
    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.06.06.1');

        /* 鏈湴 Tailwind 宸ュ叿绫诲厹搴曪細CDN 锟?鏈氨缁椂涔熻兘绔嬪埢缁欏浘鏍囧昂瀵革紝閬垮厤棣栧睆宸︿晶鏍忕┖锟?*/
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 9999px; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #ffffff;
            --sidebar-bg: #ffffff;
            --stage-bg: #fcfcfc;
            --border: #f2f2f2;
            --stage-border: #f0f0f0;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --monitor-bg: rgba(255, 255, 255, 0.7);
            --monitor-border: rgba(0, 0, 0, 0.05);
            --monitor-shadow: rgba(0, 0, 0, 0.04);
            --divider: rgba(0, 0, 0, 0.1);
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #0f141d;
            --sidebar-bg: #0f141d;
            --stage-bg: #111722;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
        }

        /* 鏋佺畝婊氬姩锟?*/
        html,
        body {
            overscroll-behavior: auto;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 渚ц竟锟?*/
        .sidebar {
            width: 80px;
            min-width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 40px 0;
            transition: width 0.5s var(--fluid-ease) 0.5s, background 0.3s, border-color 0.3s;
            z-index: 50;
        }

        .sidebar:hover {
            width: 220px;
            transition-delay: 0s;
        }

        /* 棣栨鍔犺浇鏃朵笌 iframe 锟?0.5s 娣″叆鍚屾鎾斁锛岄伩鍏嶄晶锟?鐒婃"鍦ㄥ師鍦伴€犳垚瑙嗚鏂眰 */
        @keyframes sidebar-enter {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        html:not(.studio-route-booting) .sidebar {
            animation: sidebar-enter 0.5s var(--fluid-ease);
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--text);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 浠呬繚锟?hover 鐪熸浼氱敤鍒扮殑灞炴€ц繃娓★紝閬垮厤 transition: all 鍥犻灞忓睘鎬цˉ榻愯鎰忓瑙﹀彂 */
            transition: transform 0.6s var(--fluid-ease) 0.5s, border-radius 0.6s var(--fluid-ease) 0.5s, border-color 0.3s;
        }

        .sidebar:hover .logo-ring {
            transform: rotate(90deg);
            border-radius: 50%;
            transition-delay: 0s;
        }

        /* 瀵艰埅锟?*/
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 18px;
            cursor: pointer;
            /* 鍙 width 鍋氬甫寤惰繜鐨勮繃娓★紙渚ф爮鎮仠灞曞紑鏁堟灉锛夛紱background/color 涓嶅弬涓庤繃娓★紝閬垮厤 active 鍒囨崲鏃跺簳锟?娴佸姩" */
            transition: width 0.3s var(--fluid-ease) 0.5s;
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
        }

        .sidebar:hover .nav-item {
            width: 190px;
            transition-delay: 0s;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        html.theme-dark .nav-item.active,
        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s 0.5s;
        }

        .sidebar:hover .nav-text {
            opacity: 1;
            transition-delay: 0.1s;
        }

        /* 涓昏垶鍙板尯 */
        .stage {
            flex: 1;
            background: var(--stage-bg);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--stage-border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 宸︿笅瑙掔洃瑙嗗櫒 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        .nano-monitor.is-busy {
            background: #000;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        /* 浣滆€呯粍锟?*/
        .dx-letter {
            position: absolute;
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            /* 鍙繃锟?hover 鏃剁湡姝ｆ敼锟?transform/opacity锛岄伩锟?all 瑙﹀彂寤惰繜 */
            transition: transform 0.5s var(--fluid-ease) 0.4s, opacity 0.5s var(--fluid-ease) 0.4s;
            z-index: 10;
        }

        .letter-d { transform: translateX(-8px); }
        .letter-x { transform: translateX(8px); }

        .sidebar:hover .letter-d {
            transform: translateX(-120px);
            opacity: 0;
            transition-delay: 0s;
        }

        .sidebar:hover .letter-x {
            transform: translateX(120px);
            opacity: 0;
            transition-delay: 0s;
        }

        .author-content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s var(--fluid-ease) 0s;
            pointer-events: none;
        }

        .sidebar:hover .author-content-wrap {
            opacity: 1;
            transform: scale(1);
            transition-delay: 0.2s;
            pointer-events: auto;
        }

        .author-name-lite {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--author-name);
        }

        .social-row-lite { display: flex; gap: 12px; }

        .social-icon-lite {
            color: var(--social-icon);
            transition: color 0.2s, transform 0.2s;
        }

        .social-icon-lite:hover {
            color: var(--text);
            transform: translateY(-1px);
        }

        .side-actions {
            margin-top:auto;
            margin-bottom:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            width:100%;
        }

        #github-entry-btn,
        .author-box {
            display: none !important;
        }

        .side-pill {
            width:44px;
            height:36px;
            border-radius:999px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* 鍙繃锟?hover/婵€娲讳細鏀圭殑灞炴€э紝閬垮厤 all 瑙﹀彂寤惰繜 */
            transition: width 0.3s var(--fluid-ease) 0.5s, gap 0.3s var(--fluid-ease) 0.5s, background-color 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            overflow:hidden;
            gap:8px;
            position:relative;
        }

        .sidebar:hover .side-pill {
            width: 170px;
            transition-delay: 0s;
        }

        .side-pill:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .side-pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .side-pill.update-available {
            border-color:#22c55e;
            color:#16a34a;
            overflow:visible;
        }

        html.theme-dark .side-pill.update-available,
        body.theme-dark .side-pill.update-available {
            border-color:#86efac;
            color:#86efac;
        }

        .side-pill.update-available::after {
            content:"NEW";
            position:absolute;
            top:-7px;
            right:-9px;
            min-width:28px;
            height:16px;
            padding:0 5px;
            border-radius:999px;
            background:#22c55e;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:9px;
            font-weight:900;
            letter-spacing:.02em;
            box-shadow:0 6px 16px rgba(34,197,94,.28), 0 0 0 3px rgba(34,197,94,.12);
            pointer-events:none;
        }

        html.theme-dark .side-pill.update-available::after,
        body.theme-dark .side-pill.update-available::after {
            background:#4ade80;
            color:#052e16;
            box-shadow:0 6px 16px rgba(74,222,128,.22), 0 0 0 3px rgba(74,222,128,.12);
        }

        .side-pill svg { width: 16px; height: 16px; flex:0 0 auto; }
        .side-pill-text {
            opacity:0;
            max-width:0;
            font-size:12px;
            font-weight:800;
            letter-spacing:.02em;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s 0.5s, max-width 0.3s var(--fluid-ease) 0.5s;
        }
        .sidebar:hover .side-pill-text {
            opacity:1;
            max-width:120px;
            transition-delay:.15s;
        }
        /* 鎶樺彔鎬佸幓锟?gap锛岄伩鍏嶅浘鏍囪鎺ㄥ亸 */
        .side-pill { gap:0; }
        .sidebar:hover .side-pill { gap:8px; }

        .update-now-btn {
            display:none;
            width:44px;
            height:30px;
            border-radius:999px;
            border:1px solid rgba(34,197,94,.35);
            background:rgba(34,197,94,.1);
            color:#16a34a;
            align-items:center;
            justify-content:center;
            gap:7px;
            font-size:11px;
            font-weight:900;
            overflow:hidden;
            transition:width 0.3s var(--fluid-ease) 0.5s, background-color .2s, color .2s, border-color .2s;
        }
        .update-now-btn.show { display:flex; }
        .sidebar:hover .update-now-btn { width:170px; transition-delay:0s; }
        .update-now-btn:hover { background:#16a34a; color:#fff; border-color:#16a34a; }
        .update-now-btn[disabled] { opacity:.7; cursor:wait; }
        .update-now-btn svg { width:14px; height:14px; flex:0 0 auto; }
        .update-now-text {
            opacity:0;
            max-width:0;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s 0.5s, max-width 0.3s var(--fluid-ease) 0.5s;
        }
        .sidebar:hover .update-now-text { opacity:1; max-width:110px; transition-delay:.15s; }
        html.theme-dark .update-now-btn,
        body.theme-dark .update-now-btn {
            border-color:rgba(134,239,172,.42);
            background:rgba(74,222,128,.12);
            color:#86efac;
        }
        html.theme-dark .update-now-btn:hover,
        body.theme-dark .update-now-btn:hover {
            background:#86efac;
            border-color:#86efac;
            color:#052e16;
        }
    </style>
</head>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const DEFAULT_PAGE_ID = 'zimage';
        const PAGE_IDS = ['zimage','enhance','vectorize','assets','asset-manager','workflow-apps','angle','online','canvas','api-settings','comfyui-settings'];
        const PROJECT_URL = 'https://github.com/hero8152/Infinite-Canvas';
        let appInfo = { version:'', repo_url:PROJECT_URL, version_url:'https://raw.githubusercontent.com/hero8152/Infinite-Canvas/main/VERSION' };

        function switchUI(el, id, options = {}) {
            if(!PAGE_IDS.includes(id)) id = DEFAULT_PAGE_ID;
            document.querySelectorAll('.nav-item,.side-pill').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            // sync theme to newly activated iframe
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
            // Notify the canvas after switching back so workflow settings refresh promptly.
            if (id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
        }

        function restoreActivePage() {
            const id = PAGE_IDS.includes(localStorage.getItem(ACTIVE_PAGE_KEY)) ? localStorage.getItem(ACTIVE_PAGE_KEY) : DEFAULT_PAGE_ID;
            const trigger = document.querySelector(`[onclick*="'${id}'"],[onclick*='"${id}"']`);
            switchUI(trigger, id, { skipRemember:true });
            document.documentElement.classList.remove('studio-route-booting');
        }
        document.addEventListener('DOMContentLoaded', restoreActivePage, { once:true });

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const logoDot = document.getElementById('logo-dot');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor.classList.add('is-busy');
                    queueVal.innerText = `${pos}/${total}`;
                    logoDot.style.backgroundColor = '#3b82f6';
                } else {
                    monitor.classList.remove('is-busy');
                    queueVal.innerText = total > 0 ? total : '0';
                    logoDot.style.backgroundColor = 'var(--text)';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    document.getElementById('online-val').innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 澶滈棿妯″紡 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            if(!window.StudioI18n) return;
            window.StudioI18n.toggle();
            document.querySelectorAll('iframe').forEach(frame => syncLanguageToFrame(frame));
            updateProjectUpdateTitle();
        }

        function syncLanguageToFrame(frame) {
            if(!window.StudioI18n) return;
            try {
                frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
            } catch(e) {}
        }

        function broadcastLanguage() {
            document.querySelectorAll('iframe').forEach(frame => {
                try {
                    frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
                } catch(e) {}
            });
        }

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
        });

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'light';
            updateThemeIcon(theme);
            if(window.StudioI18n) window.StudioI18n.apply();
            broadcastLanguage();
            checkForUpdates();
        });

        // sync theme when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncThemeToFrame(f);
                syncLanguageToFrame(f);
            });
        });

        function openProjectPage() {
            window.open(appInfo.repo_url || PROJECT_URL, '_blank', 'noopener');
        }

        function versionParts(value) {
            return String(value || '').match(/\d+/g)?.map(Number) || [];
        }

        function compareVersions(a, b) {
            const aa = versionParts(a);
            const bb = versionParts(b);
            const len = Math.max(aa.length, bb.length);
            for(let i = 0; i < len; i++){
                const diff = (aa[i] || 0) - (bb[i] || 0);
                if(diff) return diff;
            }
            return String(a || '').trim() === String(b || '').trim() ? 0 : 1;
        }

        function updateProjectUpdateTitle() {
            const gitBtn = document.getElementById('github-entry-btn');
            if(!gitBtn?.classList.contains('update-available')) return;
            const remoteVersion = gitBtn.dataset.remoteVersion || '';
            const isEn = window.StudioI18n?.lang?.() === 'en';
            gitBtn.title = isEn ? `New version available: ${remoteVersion || '-'}` : `鍙戠幇鏂扮増鏈細${remoteVersion || '-'}`;
            const updateBtn = document.getElementById('update-now-btn');
            if(updateBtn) updateBtn.title = isEn ? 'Update main.py and static files from GitHub' : '锟?GitHub 鏇存柊 main.py 锟?static 鏂囦欢';
        }

        function showUpdateNotice(localVersion, remoteVersion) {
            const gitBtn = document.getElementById('github-entry-btn');
            if(!gitBtn) return;
            gitBtn.classList.add('update-available');
            gitBtn.dataset.localVersion = localVersion || '';
            gitBtn.dataset.remoteVersion = remoteVersion || '';
            document.getElementById('update-now-btn')?.classList.add('show');
            updateProjectUpdateTitle();
        }

        function describeNetworkError(err, isEn){
            const msg = String(err?.message || err || '');
            const isNetwork = (err instanceof TypeError) || /Failed to fetch|NetworkError|ERR_|timed? ?out|瓒呮椂|鏃犳硶杩炴帴|GitHub|HTTP 4|HTTP 5/i.test(msg);
            if(isNetwork){
                return isEn
                    ? 'Cannot reach GitHub. Please make sure this machine has internet access (and can reach github.com / raw.githubusercontent.com). If you are in a restricted network you may need a proxy or VPN.'
                    : 'Cannot reach GitHub. Please check network access to github.com and raw.githubusercontent.com.';
            }
            return msg || (isEn ? 'Update failed' : '鏇存柊澶辫触');
        }

        async function runProjectUpdate() {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const askMessage = isEn
                ? 'Update main.py, VERSION, and static files from GitHub now? A backup will be created. Click OK to update and auto-restart the backend. Requires an internet connection (github.com).'
                : 'Update main.py, VERSION, and static files from GitHub now? A backup will be created and the backend will restart.';
            if(!confirm(askMessage)) return;
            const btn = document.getElementById('update-now-btn');
            const text = document.getElementById('update-now-text');
            const oldText = text?.textContent || '';
            if(btn) btn.disabled = true;
            if(text) text.textContent = isEn ? 'Updating...' : '鏇存柊锟?..';
            try {
                const res = await fetch('/api/update-from-github', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ auto_restart:true, restart_delay:3 })
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Update failed' : '鏇存柊澶辫触'));
                const restarting = data.restart_scheduled;
                const done = restarting
                    ? `Updated ${data.count || 0} files. The backend will restart in ~3 seconds. This page will auto-reload when it's back.`
                    : `Updated ${data.count || 0} files. Please restart the backend, then refresh this page.`;
                alert(done);
                document.getElementById('github-entry-btn')?.classList.remove('update-available');
                btn?.classList.remove('show');
                if(restarting) waitForBackendAndReload();
            } catch(e) {
                alert((isEn ? 'Update failed: ' : 'Update failed: ') + describeNetworkError(e, isEn));
            } finally {
                if(btn) btn.disabled = false;
                if(text) text.textContent = oldText || (isEn ? 'Update' : 'Update');
            }
        }
        async function waitForBackendAndReload() {
            const deadline = Date.now() + 90 * 1000;
            await new Promise(r => setTimeout(r, 4000));
            while(Date.now() < deadline) {
                try {
                    const r = await fetch('/api/app-info', { cache:'no-store' });
                    if(r.ok) { location.reload(); return; }
                } catch {}
                await new Promise(r => setTimeout(r, 1500));
            }
        }
        async function rollbackProjectUpdate() {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            try {
                const list = await fetch('/api/update-backups').then(r => r.json());
                const backups = list.backups || [];
                if(!backups.length){ alert(isEn ? 'No backups available.' : 'No backups available.'); return; }
                const lines = backups.slice(0, 8).map((b, i) => {
                    const d = new Date((b.created_at || 0) * 1000);
                    const ts = d.toLocaleString();
                    return `${i + 1}. ${b.name}  (${b.file_count} files, ${ts})`;
                });
                const promptMsg = (isEn
                    ? 'Select a backup to restore (enter the number):\n'
                    : '閫夋嫨瑕佽繕鍘熺殑澶囦唤锛堣緭鍏ュ簭鍙凤級锛歕n') + lines.join('\n');
                const answer = prompt(promptMsg, '1');
                const idx = Number(answer) - 1;
                if(!(idx >= 0 && idx < backups.length)) return;
                const target = backups[idx];
                if(!confirm(`Restore "${target.name}"? Backend will restart.`)) return;
                const res = await fetch('/api/update-rollback', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ name:target.name, auto_restart:true, restart_delay:3 })
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Rollback failed' : '鍥炴粴澶辫触'));
                alert(`Restored ${data.count || 0} files. Backend is restarting.`);
                if(data.restart_scheduled) waitForBackendAndReload();
            } catch(e) {
                alert((isEn ? 'Rollback failed: ' : 'Rollback failed: ') + describeNetworkError(e, isEn));
            }
        }
        window.rollbackProjectUpdate = rollbackProjectUpdate;

        async function checkForUpdates() {
            try {
                const info = await fetch('/api/app-info', { cache:'no-store' }).then(r => r.json());
                appInfo = {...appInfo, ...info};
                const current = String(appInfo.version || '').trim();
                const remoteText = await fetch(`${appInfo.version_url || ''}?t=${Date.now()}`, { cache:'no-store' }).then(r => r.ok ? r.text() : '');
                const remote = String(remoteText || '').trim().split(/\r?\n/)[0].trim();
                if(current && remote && compareVersions(remote, current) > 0) showUpdateNotice(current, remote);
            } catch(e) {
                // Keep quiet when offline so local use is not interrupted.
            }
        }
    </script>
</body>
