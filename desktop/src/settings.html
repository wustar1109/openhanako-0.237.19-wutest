<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:*; img-src 'self' data: file: http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:;">
    <title>Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes/warm-paper.css" id="themeSheet">
    <style>
        /* 窗口级覆盖：settings-panel 填满整个窗口 */
        body {
            --paper-texture-attachment: scroll;
            background-color: var(--bg);
            overflow: hidden;
        }
        body.paper-texture {
            background-attachment: scroll;
        }
        .settings-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            border-radius: 0;
            box-shadow: none;
            border: none;
            transform: none;
            z-index: 1;
            padding-top: 0;
        }
        .settings-header {
            -webkit-app-region: drag;
            padding: 36px 0 var(--space-md, 12px) 20px;
        }
        .settings-header button,
        .settings-header input,
        .settings-header select,
        .settings-header textarea {
            -webkit-app-region: no-drag;
        }
        /* 隐藏返回按钮（窗口有自己的关闭按钮） */
        .settings-back-btn { display: none; }
        /* Windows/Linux：透明标题栏覆盖层，只为承载 window controls 注入点 */
        .titlebar-minimal {
            background: transparent !important;
            background-image: none !important;
            border-bottom: none;
            z-index: 100;
        }
        /* Windows/Linux：settings-panel 顶部让出 titlebar 高度，避免 drag 区域冲突 */
        html[data-platform="win32"] .settings-panel,
        html[data-platform="linux"] .settings-panel {
            top: 38px;
        }
        html[data-platform="win32"] .settings-header,
        html[data-platform="linux"] .settings-header {
            padding-top: 10px;
        }
        html[data-platform="win32"] .titlebar-minimal,
        html[data-platform="linux"] .titlebar-minimal {
            pointer-events: auto;
            height: 38px;
        }
        /* 加载蒙版 */
        .settings-loading-mask {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: var(--bg);
            transition: opacity 0.25s ease;
        }
        body.paper-texture .settings-loading-mask {
            background-image: url(./assets/textures/rice-paper.png);
            background-repeat: repeat;
            background-size: 160px;
        }
        .settings-loading-mask.fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="react-root"></div>
    <!-- Windows/Linux 自绘窗口控制按钮注入点：必须在 react-root 之后，否则被 React 渲染层遮蔽 -->
    <div class="titlebar titlebar-minimal"></div>

    <script src="lib/i18n.js"></script>
    <script src="lib/theme.js"></script>
    <script src="modules/platform.js"></script>
    <script type="module" src="./settings-main.tsx"></script>
</body>
</html>
